# Open edX CMS (Studio) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms
  namespace: openedx
  labels:
    app.kubernetes.io/name: cms
    app.kubernetes.io/part-of: futurelib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cms
    spec:
      containers:
        - name: cms
          image: docker.io/overhangio/openedx:18.0.0
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: openedx-config
            - secretRef:
                name: openedx-secrets
          env:
            - name: SERVICE_VARIANT
              value: cms
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /heartbeat
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cms
  namespace: openedx
  labels:
    app.kubernetes.io/name: cms
    app.kubernetes.io/part-of: futurelib
spec:
  selector:
    app.kubernetes.io/name: cms
  ports:
    - port: 8010
      targetPort: 8010
      name: http
