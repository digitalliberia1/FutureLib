# Open edX Celery Workers (LMS + CMS tasks: email, grading, certificate generation)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-worker
  namespace: openedx
  labels:
    app.kubernetes.io/name: lms-worker
    app.kubernetes.io/part-of: futurelib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lms-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lms-worker
    spec:
      containers:
        - name: lms-worker
          image: docker.io/overhangio/openedx:18.0.0
          command: ["celery", "--app=lms.celery", "worker", "--loglevel=info", "--hostname=edx.lms.%%h", "--maxtasksperchild=100"]
          envFrom:
            - configMapRef:
                name: openedx-config
            - secretRef:
                name: openedx-secrets
          env:
            - name: SERVICE_VARIANT
              value: lms
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-worker
  namespace: openedx
  labels:
    app.kubernetes.io/name: cms-worker
    app.kubernetes.io/part-of: futurelib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cms-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cms-worker
    spec:
      containers:
        - name: cms-worker
          image: docker.io/overhangio/openedx:18.0.0
          command: ["celery", "--app=cms.celery", "worker", "--loglevel=info", "--hostname=edx.cms.%%h", "--maxtasksperchild=100"]
          envFrom:
            - configMapRef:
                name: openedx-config
            - secretRef:
                name: openedx-secrets
          env:
            - name: SERVICE_VARIANT
              value: cms
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
