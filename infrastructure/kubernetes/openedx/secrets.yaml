apiVersion: v1
kind: Secret
metadata:
  name: openedx-secrets
  namespace: openedx
  labels:
    app.kubernetes.io/part-of: futurelib
type: Opaque
# DO NOT commit real values. Use `kubectl create secret` or a secrets manager.
# Replace all <base64-encoded-...> values before applying.
#
# Encode a value:  echo -n "my-secret" | base64
stringData:
  OPENEDX_SECRET_KEY: "CHANGE_THIS_TO_LONG_RANDOM_SECRET"
  MYSQL_PASSWORD: "CHANGE_THIS_MYSQL_PASSWORD"
  MONGODB_PASSWORD: "CHANGE_THIS_MONGO_PASSWORD"
  # FutureLib OAuth2 client credentials
  FUTURELIB_OAUTH_CLIENT_ID: "futurelib-client"
  FUTURELIB_OAUTH_CLIENT_SECRET: "CHANGE_THIS_OAUTH_SECRET"
  # JWT signing key (must match FutureLib backend OPENEDX_LTI_SECRET)
  FUTURELIB_JWT_SECRET: "CHANGE_THIS_JWT_SECRET"
