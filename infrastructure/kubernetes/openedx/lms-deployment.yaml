# Open edX LMS Deployment
# Generated by Tutor k8s: `tutor k8s start`
# This manifest is a reference template. In practice, use:
#   tutor k8s start
# which generates correct manifests including all init containers, volumes,
# and service accounts. The values here mirror the Tutor-generated output
# for documentation and GitOps reference.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms
  namespace: openedx
  labels:
    app.kubernetes.io/name: lms
    app.kubernetes.io/part-of: futurelib
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lms
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lms
    spec:
      containers:
        - name: lms
          image: docker.io/overhangio/openedx:18.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: openedx-config
            - secretRef:
                name: openedx-secrets
          env:
            - name: SERVICE_VARIANT
              value: lms
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /heartbeat
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /heartbeat
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: settings
              mountPath: /openedx/config
      volumes:
        - name: settings
          configMap:
            name: openedx-config
---
apiVersion: v1
kind: Service
metadata:
  name: lms
  namespace: openedx
  labels:
    app.kubernetes.io/name: lms
    app.kubernetes.io/part-of: futurelib
spec:
  selector:
    app.kubernetes.io/name: lms
  ports:
    - port: 8000
      targetPort: 8000
      name: http
