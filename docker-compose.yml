version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: futurelib-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: futurelib
    networks:
      - futurelib-net

  redis:
    image: redis:7-alpine
    container_name: futurelib-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - futurelib-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futurelib-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - futurelib-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: futurelib-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - futurelib-net

networks:
  futurelib-net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
